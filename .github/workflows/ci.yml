name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx biome check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: cd server && bun install --frozen-lockfile
      - run: cd server && bunx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Root CLI unit suite (mocked transport) with coverage. `test:coverage`
      # runs the same suite as `test` plus a v8 report; the config carries a
      # ratchet threshold (F38), so this step also guards against regressions.
      - run: bun run test:coverage
      # Server suite — includes the P1-1 CLI/local-server contract guard.
      - run: cd server && bun install --frozen-lockfile
      - run: cd server && bunx --bun vitest run

  # End-to-end smoke: boots the bundled server and drives the real CLI binary
  # against it over HTTP (P1-6 / F18). Needs BOTH the root deps (CLI) and the
  # server deps (graphql-yoga etc.), so install both before running.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: cd server && bun install --frozen-lockfile
      - run: bun run test:e2e
