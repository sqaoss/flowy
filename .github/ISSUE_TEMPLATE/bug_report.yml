name: Bug report
description: Report something that isn't working as documented
title: '[bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the details
        below so we can reproduce it quickly. For security vulnerabilities,
        do **not** open an issue — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: I ran `flowy task create ...` and got ... but expected ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran, in order.
      placeholder: |
        1. flowy setup local
        2. flowy serve &
        3. flowy init
        4. ...
      render: shell
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: How is the CLI configured?
      options:
        - Self-hosted (flowy serve / local server)
        - Remote (hosted flowy-ai.fly.dev)
        - Not sure
    validations:
      required: true
  - type: input
    id: cli-version
    attributes:
      label: Flowy CLI version
      description: Output of `flowy --version`.
      placeholder: 1.13.0
    validations:
      required: true
  - type: input
    id: bun-version
    attributes:
      label: Bun version
      description: Output of `bun --version` (the CLI requires Bun >= 1.3).
      placeholder: 1.3.11
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: macOS 15, Ubuntu 24.04, ...
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      description: Paste the command output. Redact any API keys or tokens first.
      render: shell
    validations:
      required: false
